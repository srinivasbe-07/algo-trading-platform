version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: "/services/health-service"
    schedule: { interval: weekly }
  - package-ecosystem: npm
    directory: "/frontend"
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
