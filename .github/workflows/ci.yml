name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Lint, types, complexity, security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check --output-format=github .
      - name: Ruff format check
        run: ruff format --check .
      - name: mypy type check
        run: mypy services libs
      - name: Cyclomatic complexity (fail on rank C or worse)
        run: radon cc -s -n C --total-average services libs
      - name: Bandit (SAST)
        run: bandit -q -r services libs -c pyproject.toml

  tests:
    name: Tests + coverage gate (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Pytest with coverage (fails under threshold in pyproject)
        run: pytest --cov --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml

  dependency-scan:
    name: Dependency vulnerabilities (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: pip-audit
        run: pip-audit --strict

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-image-scan:
    name: Build image + Trivy scan
    runs-on: ubuntu-latest
    needs: [static-checks, tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build health-service image
        run: docker build -f services/health-service/Dockerfile -t health-service:${{ github.sha }} .
      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: health-service:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  # Deploy runs only on main, after every gate is green. Stubbed until infra is live.
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-and-image-scan, dependency-scan, secret-scan]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - run: |
          echo "TODO Phase 3+ - push image to ECR and apply Terraform/Helm to staging."
